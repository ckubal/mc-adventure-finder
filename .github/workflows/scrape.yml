name: Scrape events into Firebase

# Runs the scrapers (including the headless-Chrome ones) inside the GitHub runner and
# writes straight to Firestore. This keeps browser work OFF the Render web service, which
# is too small to launch Chrome without exceeding its memory limit.
# The site just reads Firestore, so this is what keeps the data fresh.

on:
  schedule:
    - cron: "0 */2 * * *" # every 2 hours (UTC)
  workflow_dispatch:
    inputs:
      batch:
        description: "Single batch index (0-8) to run. Leave blank to run all sources."
        required: false
        default: ""

concurrency:
  group: scrape
  cancel-in-progress: false

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      PLAYWRIGHT_BROWSERS_PATH: "0"
      FIREBASE_SERVICE_ACCOUNT_KEY: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_KEY }}
      FIREBASE_PROJECT_ID: ${{ secrets.FIREBASE_PROJECT_ID }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      # postinstall installs the chromium binary into node_modules (PLAYWRIGHT_BROWSERS_PATH=0).
      - run: npm ci

      # System libraries chromium needs on the runner.
      - run: npx playwright install-deps chromium

      - name: Scrape
        run: |
          if [ -n "${{ github.event.inputs.batch }}" ]; then
            npm run scrape -- --batch "${{ github.event.inputs.batch }}"
          else
            npm run scrape
          fi
